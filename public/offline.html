<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Velle Baazi - Offline</title>
    <style>
      :root {
        color-scheme: dark;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #0f0f12;
        color: #f5f5f5;
        font-family: Arial, sans-serif;
      }

      .card {
        width: min(90vw, 320px);
        padding: 28px 22px;
        border: 1px solid #2d2d33;
        border-radius: 18px;
        background: #17171c;
        text-align: center;
      }

      .logo {
        width: 56px;
        height: 56px;
        border-radius: 14px;
        margin: 0 auto 14px;
        display: block;
      }

      h1 {
        margin: 0 0 8px;
        font-size: 20px;
      }

      p {
        margin: 0;
        color: #b7b7c2;
        font-size: 14px;
        line-height: 1.45;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <img class="logo" src="/logo.png" alt="Velle Baazi" />
      <h1>You are offline</h1>
      <p>Reconnect to the internet and refresh to continue.</p>
    </main>
  </body>
</html>
